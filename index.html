<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baktiar | Website Coming Soon</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        .container {
            background: rgba(0, 0, 0, 0.2);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .status {
            font-size: 16px;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 30px;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .links a {
            color: white;
            text-decoration: none;
            font-size: 28px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        /* Har bir icon uchun hover effekti */
        .links a:hover {
            transform: translateY(-5px);
            opacity: 0.8;
        }

        /* Rangli hoverlar (ixtiyoriy) */
        .fa-telegram:hover { color: #229ED9; }
        .fa-instagram:hover { color: #E1306C; }
        .fa-github:hover { color: #333; }
        .fa-linkedin:hover { color: #0077b5; }
        .fa-envelope:hover { color: #fbbc05; }
    </style>
</head>
<body>

<div class="container">
    <h1>Baktiar</h1>
    <p class="subtitle">Backend Developer (in progress)</p>
    
    <div class="status">
        🚧 Website under development
    </div>

    <div class="links">
        <a href="https://t.me/xolmominov1" target="_blank" title="Telegram">
            <i class="fab fa-telegram"></i>
        </a>

        <a href="https://instagram.com/bakhtiycc" target="_blank" title="Instagram">
            <i class="fab fa-instagram"></i>
        </a>

        <a href="https://github.com/baxti-code" target="_blank" title="GitHub">
            <i class="fab fa-github"></i>
        </a>

        <a href="https://linkedin.com/in/baxtiyor-developer" target="_blank" title="LinkedIn">
            <i class="fab fa-linkedin"></i>
        </a>

        <a href="mailto:hello@baktiar.uz" title="Email">
            <i class="fas fa-envelope"></i>
        </a>
    </div>
</div>

</body>
</html>
